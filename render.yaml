databases:
  - name: fairsight-db
    databaseName: fairsight
    user: fairsight

envVarGroups:
  - name: fairsight
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

services:
  # Managed Redis used by both the API (health checks) and Celery.
  - type: redis
    name: fairsight-redis
    ipAllowList: []
    plan: starter

  - type: web
    name: fairsight-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    disk:
      name: fairsight-uploads
      mountPath: /app/uploads
      sizeGB: 10
    envVars:
      - fromGroup: fairsight
      - key: DATABASE_URL
        fromDatabase:
          name: fairsight-db
          property: connectionString
      - key: ALEMBIC_DATABASE_URL
        fromDatabase:
          name: fairsight-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fairsight-redis
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://YOUR_FRONTEND_DOMAIN_HERE
      
      - key: CORS_ORIGINS
        value: https://YOUR_FRONTEND_DOMAIN_HERE

  - type: worker
    name: fairsight-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    dockerCommand: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
    disk:
      name: fairsight-uploads
      mountPath: /app/uploads
      sizeGB: 10
    envVars:
      - fromGroup: fairsight
      - key: DATABASE_URL
        fromDatabase:
          name: fairsight-db
          property: connectionString
      - key: ALEMBIC_DATABASE_URL
        fromDatabase:
          name: fairsight-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fairsight-redis
          property: connectionString
